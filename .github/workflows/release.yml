name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: IsoDAQ-Studio-windows-x64.zip
            dist_name: IsoDAQ Studio
          - os: ubuntu-22.04
            artifact: IsoDAQ-Studio-linux-x64.tar.gz
            dist_name: IsoDAQ Studio
          # macOS: Apple Silicon (arm64) only. GitHub's Intel (macos-13) runner
          # pool is being wound down and can queue for hours, blocking the whole
          # release, so we don't ship a native Intel build — Intel Mac users run
          # from source (it's a pure-Python app; see the README). PyInstaller
          # builds the runner's native arch (spec target_arch=None).
          - os: macos-14
            artifact: IsoDAQ-Studio-macos-arm64.zip
            dist_name: IsoDAQ Studio.app

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Linux: install Qt platform plugin dependencies
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xkb1 \
            libxkbcommon-x11-0 libegl1 libgl1 libdbus-1-3 \
            libxcb-cursor0 x11-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Build with PyInstaller
        run: pyinstaller isodaq.spec --noconfirm

      # ── Windows: zip the dist folder ────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\IsoDAQ Studio" `
            -DestinationPath "${{ matrix.artifact }}"

      # ── Linux: tar.gz the dist folder ───────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.artifact }}" -C dist "IsoDAQ Studio"

      # ── macOS: ad-hoc sign, then zip the .app bundle ─────────────────────────
      # We don't have an Apple Developer certificate, so builds are not
      # notarized. An ad-hoc signature (--sign -) is still required for arm64
      # binaries to run at all, and prevents the "app is damaged" error. Users
      # bypass Gatekeeper's "unidentified developer" prompt via right-click →
      # Open (documented in the README).
      - name: Ad-hoc sign the .app (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - "dist/IsoDAQ Studio.app"
          codesign --verify --deep --strict --verbose=2 "dist/IsoDAQ Studio.app"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # ditto preserves the signature & bundle metadata better than zip
          cd dist
          ditto -c -k --keepParent "IsoDAQ Studio.app" "../${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            IsoDAQ-Studio-windows-x64.zip
            IsoDAQ-Studio-linux-x64.tar.gz
            IsoDAQ-Studio-macos-arm64.zip
