name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: IsoDAQ-Studio-windows-x64.zip
            dist_name: IsoDAQ Studio
          - os: ubuntu-22.04
            artifact: IsoDAQ-Studio-linux-x64.tar.gz
            dist_name: IsoDAQ Studio
          - os: macos-latest
            artifact: IsoDAQ-Studio-macos-x64.zip
            dist_name: IsoDAQ Studio.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Linux: install Qt platform plugin dependencies
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xkb1 \
            libxkbcommon-x11-0 libegl1 libgl1 libdbus-1-3 \
            libxcb-cursor0 x11-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Build with PyInstaller
        run: pyinstaller isodaq.spec --noconfirm

      # ── Windows: zip the dist folder ────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\IsoDAQ Studio" `
            -DestinationPath "${{ matrix.artifact }}"

      # ── Linux: tar.gz the dist folder ───────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.artifact }}" -C dist "IsoDAQ Studio"

      # ── macOS: zip the .app bundle ───────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "../${{ matrix.artifact }}" "IsoDAQ Studio.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            IsoDAQ-Studio-windows-x64.zip
            IsoDAQ-Studio-linux-x64.tar.gz
            IsoDAQ-Studio-macos-x64.zip
